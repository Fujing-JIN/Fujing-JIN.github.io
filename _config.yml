# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Fujing JIN (靳馥境)"
title_separator          : "-"
name                     : &name "Fujing JIN"
description              : &description "Associate Professor at Beijing Jiaotong University | Visiting Scholar at WashU"
url                      : "https://fujing-jin.github.io" 
baseurl                  : "" 
repository               : "fujing-jin.github.io"

# Site Author
author:
  avatar           : "profile.png" # 请确保在 images/ 文件夹下上传了名为 profile.png 的照片
  #name             : "Fujing JIN (靳馥境)"
  bio              : "Associate Professor, Beijing Jiaotong University"
  location         : "Beijing, China & St. Louis, US"
  employer         : "Beijing Jiaotong University"
  #uri              : 
  email            : "fjjin@bjtu.edu.cn"

  # Academic websites (如需启用，删掉前面的 # 并填入正确链接)
  #googlescholar    : "https://scholar.google.com/citations?user=你的ID"
  #researchgate     : "https://www.researchgate.net/profile/Fujing-Jin"
  #orcid            : "https://orcid.org/0000-0000-0000-0000"

  # Repositories and social media
  #github           : "fujing-jin"
  #linkedin         : 

# Publication Category Settings
publication_category:
  manuscripts:
    title: 'Journal Articles'    
  working_papers:
    title: 'Working Papers'


# Site Settings
teaser                   : 
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - node_modules
  - package.json
  - Gemfile
  - README
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections Settings
collections:
  publications:
    output: true
    permalink: /:collection/:path/
  # 暂时注释掉以下模块，以后需要时删掉 # 号即可
  #teaching:
  #  output: true
  #  permalink: /:collection/:path/
  #talks:
  #  output: true
  #  permalink: /:collection/:path/

# Default layouts for pages and collections
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

timezone: Etc/UTC
